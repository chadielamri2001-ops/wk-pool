<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WK 2026 Voorspelpoule</title>
<style>
  :root{
    --bg:#0b1f17;
    --panel:#11281d;
    --panel2:#15301f;
    --line:#2a4a35;
    --accent:#ffb703;
    --accent2:#3ddc84;
    --text:#eef5ee;
    --muted:#9ab6a4;
    --red:#e85d4e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(180deg,#0b1f17 0%, #0e2419 100%);
    color:var(--text);
    padding-bottom:60px;
  }
  header{
    padding:22px 16px 14px;
    text-align:center;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:#0b1f17ee;
    backdrop-filter:blur(6px);
    z-index:10;
  }
  header h1{
    margin:0;
    font-size:1.4rem;
    letter-spacing:0.04em;
    font-weight:800;
  }
  header h1 span{color:var(--accent);}
  header p{margin:4px 0 0;color:var(--muted);font-size:0.85rem;}

  .tabs{
    display:flex;
    gap:6px;
    padding:10px 12px;
    overflow-x:auto;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:62px;
    background:#0b1f17;
    z-index:9;
    -webkit-overflow-scrolling:touch;
  }
  .tab{
    flex:0 0 auto;
    padding:8px 14px;
    border-radius:20px;
    background:var(--panel);
    color:var(--muted);
    border:1px solid var(--line);
    font-size:0.85rem;
    font-weight:600;
    white-space:nowrap;
  }
  .tab.active{
    background:var(--accent);
    color:#1a1300;
    border-color:var(--accent);
  }

  main{padding:14px 12px;max-width:720px;margin:0 auto;}

  .player-select{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  .player-chip{
    padding:7px 13px;
    border-radius:18px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    font-size:0.85rem;
    font-weight:600;
  }
  .player-chip.active{
    background:var(--accent2);
    color:#06251a;
    border-color:var(--accent2);
  }

  .group-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:14px;
    overflow:hidden;
  }
  .group-head{
    padding:10px 14px;
    font-weight:800;
    font-size:0.95rem;
    background:var(--panel2);
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .group-head .teams{
    color:var(--muted);
    font-weight:500;
    font-size:0.75rem;
  }

  .match{
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .match:last-child{border-bottom:none;}
  .match.played{background:rgba(61,220,132,0.05);}

  .match-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:0.7rem;
    color:var(--muted);
  }
  .match-status{
    font-size:0.65rem;
    font-weight:700;
    padding:2px 8px;
    border-radius:10px;
    background:var(--line);
  }
  .match-status.played{
    background:var(--accent2);
    color:#06251a;
  }

  .teams-row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:8px;
  }
  .team-name{
    font-weight:700;
    font-size:0.95rem;
  }
  .team-name.right{text-align:right;}

  .score-inputs{
    display:flex;
    align-items:center;
    gap:6px;
    justify-content:center;
  }
  .score-inputs input{
    width:38px;
    height:38px;
    text-align:center;
    font-size:1.1rem;
    font-weight:800;
    border-radius:8px;
    border:1px solid var(--line);
    background:#0b1f17;
    color:var(--text);
  }
  .score-inputs input:focus{
    outline:none;
    border-color:var(--accent);
  }
  .score-inputs .dash{color:var(--muted);font-weight:700;}

  .actual-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    font-size:0.8rem;
    color:var(--muted);
  }
  .actual-row input{
    width:34px;
    height:32px;
    text-align:center;
    border-radius:8px;
    border:1px solid var(--accent2);
    background:rgba(61,220,132,0.08);
    color:var(--accent2);
    font-weight:800;
    font-size:1rem;
  }
  .actual-row .lbl{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }

  .points-pill{
    align-self:center;
    font-size:0.7rem;
    font-weight:800;
    padding:2px 10px;
    border-radius:10px;
    background:var(--accent);
    color:#1a1300;
  }
  .points-pill.zero{
    background:var(--line);
    color:var(--muted);
  }

  /* Leaderboard */
  .lb-table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .lb-table th, .lb-table td{
    padding:10px 12px;
    text-align:left;
    font-size:0.9rem;
  }
  .lb-table th{
    background:var(--panel2);
    color:var(--muted);
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }
  .lb-table tr:not(:last-child) td{border-bottom:1px solid var(--line);}
  .lb-table td.points{font-weight:800;color:var(--accent);text-align:right;}
  .lb-table td.rank{color:var(--muted);font-weight:800;width:30px;}
  .lb-table tr.you td{background:rgba(255,183,3,0.08);}

  .rules-box{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin-bottom:14px;
    font-size:0.85rem;
    line-height:1.6;
    color:var(--muted);
  }
  .rules-box b{color:var(--text);}
  .rules-box ul{margin:6px 0 0;padding-left:20px;}

  .legend{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    font-size:0.75rem;
    color:var(--muted);
    margin-bottom:10px;
  }
  .legend span{display:flex;align-items:center;gap:5px;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .dot.green{background:var(--accent2);}
  .dot.gold{background:var(--accent);}

  .empty{
    text-align:center;
    color:var(--muted);
    padding:30px 10px;
    font-size:0.9rem;
  }

  .save-toast{
    position:fixed;
    bottom:16px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--accent2);
    color:#06251a;
    padding:8px 18px;
    border-radius:20px;
    font-weight:700;
    font-size:0.8rem;
    opacity:0;
    transition:all 0.25s ease;
    pointer-events:none;
  }
  .save-toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .manage-row{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .manage-row input{
    flex:1;
    padding:9px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text);
    font-size:0.9rem;
  }
  .manage-row button{
    padding:9px 16px;
    border-radius:10px;
    border:none;
    background:var(--accent);
    color:#1a1300;
    font-weight:700;
    font-size:0.9rem;
  }
  .player-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:8px;
  }
  .player-row .remove{
    color:var(--red);
    font-weight:700;
    font-size:0.8rem;
  }
</style>
</head>

/* ---------- TIME / LOCKING ---------- */
// All match dates are "DD jun"/"DD jul" 2026, times are NL local time (Europe/Amsterdam).
const MONTH_MAP = {jun:"06", jul:"07"};
function kickoffUTCMillis(m){
  const parts = m.date.split(" "); // ["11","jun"]
  const day = parts[0].padStart(2,"0");
  const month = MONTH_MAP[parts[1]];
  // Build an ISO string and ask: what UTC instant corresponds to this wall-clock
  // time in Europe/Amsterdam? We do this by formatting a guess and adjusting
  // for the Amsterdam offset (CET=+1 / CEST=+2). June/July = CEST = +2.
  const offsetHours = 2; // CEST applies for all WK 2026 group stage dates (Jun-Jul)
  const iso = `2026-${month}-${day}T${m.time}:00`;
  const localMillis = Date.parse(iso + "Z"); // treat as if UTC, then shift
  return localMillis - offsetHours*3600*1000; // actual UTC instant
}
function isLocked(m){
  if(getActual(m)) return true;
  return Date.now() >= kickoffUTCMillis(m);
}
function isKOLocked(m){
  if(getActual(m)) return true;
  return Date.now() >= kickoffUTCMillis(m);
}

  current: "Jij",

/* ---------- CONFIG ---------- */
// Vul hier de Web App URL in die je krijgt na het deployen van Code.gs
// (Apps Script > Implementeren > Web app). Eindigt op /exec
const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycbywc8cRFhuJsFiCfwz-TeXU_UOwSkTW57frUBCoSu6EtIx17fNP_3ypYO0lYsavcUy5/exec"
};

const STORAGE_KEY = "wkpool-data-v1";
const LOCAL_KEY = "wkpool-local-v1"; // remembers which name this device is using

let lastSyncError = null;

function loadState(){
  return new Promise(resolve=>{
    if(!CONFIG.API_URL || CONFIG.API_URL.indexOf("http")!==0){
      resolve();
      return;
    }
    fetch(CONFIG.API_URL)
      .then(r=>{
        if(!r.ok) throw new Error("HTTP "+r.status);
        return r.json();
      })
      .then(data=>{
        state = Object.assign(state, data);
        lastSyncError = null;
        resolve();
      })
      .catch(err=>{
        lastSyncError = "Laden mislukt: " + err.message;
        resolve();
      });
  });
}

function saveState(){
  if(!CONFIG.API_URL || CONFIG.API_URL.indexOf("http")!==0){
    showToast();
    return;
  }
  const payload = {
    players: state.players,
    predictions: state.predictions,
    actuals: state.actuals,
    koTeams: state.koTeams
  };
  fetch(CONFIG.API_URL, {
    method: "POST",
    headers: {"Content-Type": "text/plain;charset=utf-8"}, // avoids CORS preflight
    body: JSON.stringify(payload)
  }).then(r=>{
    if(!r.ok) throw new Error("HTTP "+r.status);
    lastSyncError = null;
    showToast();
  }).catch(err=>{
    lastSyncError = "Opslaan mislukt: " + err.message;
    showToast(true);
  });
}

function loadLocalName(){
  return new Promise(resolve=>{
    try{
      const v = localStorage.getItem(LOCAL_KEY);
      resolve(v || null);
    }catch(e){
      resolve(null);
    }
  });
}

function saveLocalName(name){
  try{
    localStorage.setItem(LOCAL_KEY, name);
  }catch(e){}
}

let toastTimer=null;
function showToast(isError){
  const t = document.getElementById("toast");
  if(isError){
    t.textContent = "Opslaan mislukt – zie tabblad Regels";
    t.style.background = "var(--red)";
    t.style.color = "#fff";
  } else {
    t.textContent = "Opgeslagen ✓";
    t.style.background = "var(--accent2)";
    t.style.color = "#06251a";
  }
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), isError?3000:1100);
}

function getActual(m){
  const override = state.actuals && state.actuals[m.id];
  if(override) return override;
  return m.actual;
}
// 5 punten: exacte uitslag
// 3 punten: juiste verschil (bv. 2-1 voorspeld, 3-2 werkelijk)
// 1 punt: juiste uitkomst (winst/gelijk/verlies), verschil niet juist
// 0 punten: fout
function calcPoints(pred, actual){
  if(!pred || !actual) return null;
  const [ph,pa] = pred;
  const [ah,aa] = actual;
  if(ph===""||pa===""||ph===null||pa===null) return null;
  const PH=Number(ph), PA=Number(pa), AH=Number(ah), AA=Number(aa);
  if(isNaN(PH)||isNaN(PA)) return null;
  if(PH===AH && PA===AA) return 5;
  const predDiff = PH-PA;
  const actDiff = AH-AA;
  const predOutcome = Math.sign(predDiff);
  const actOutcome = Math.sign(actDiff);
  if(predOutcome!==actOutcome) return 0;
  if(predDiff===actDiff) return 3;
  return 1;
}

function getPred(player, matchId){
  const p = state.predictions[player];
  if(!p) return [null,null];
  return p[matchId] || [null,null];
}

function setPred(player, matchId, idx, val){
  if(!state.predictions[player]) state.predictions[player]={};
  if(!state.predictions[player][matchId]) state.predictions[player][matchId]=[null,null];
  state.predictions[player][matchId][idx] = val;
  saveState();
}

function renderStand(){
  const main = document.getElementById("main");
  document.getElementById("subhead").textContent = "Tussenstand poule";

  const ALL_MATCHES = MATCHES.concat(KNOCKOUT_MATCHES);
  const playedMatches = ALL_MATCHES.filter(m=>getActual(m));

  let rows = state.players.map(p=>{
    let total=0, exact=0, correctCount=0, played=0;
    playedMatches.forEach(m=>{
      const pred = getPred(p, m.id);
      const pts = calcPoints(pred, getActual(m));
      if(pts!==null){
        total += pts;
        played++;
        if(pts===5) exact++;
        if(pts>0) correctCount++;
      }
    });
    return {player:p, total, exact, played};
  });

  rows.sort((a,b)=>b.total-a.total);

  const PRIZES = ["🥇 Gratis diner (de rest trakteert)","🥈 Gratis drinken bij het eten","🥉 Mag de eetplek uitkiezen"];

  let html = `<div class="rules-box">

  </div>`;

  if(playedMatches.length===0){
    html += `<div class="empty">Nog geen wedstrijden gespeeld of voorspellingen ingevuld.</div>`;

}

      render();
    });
  });

  main.querySelectorAll('[data-editteams]').forEach(el=>{
    el.onclick = ()=>{
      state.editingTeams = (state.editingTeams===el.dataset.editteams) ? null : el.dataset.editteams;
      render();
    };
  });

  main.querySelectorAll('[data-saveteams]').forEach(btn=>{
    btn.onclick = ()=>{
      const mid = btn.dataset.saveteams;
      const inputs = main.querySelectorAll(`input[data-teamname="${mid}"]`);
      const t1 = inputs[0].value.trim(), t2 = inputs[1].value.trim();
      if(!t1 || !t2) return;
      if(!state.koTeams) state.koTeams = {};
      state.koTeams[mid] = [t1, t2];
      state.editingTeams = null;
      saveState();
      render();
    };
  });

  main.querySelectorAll('[data-saveactual]').forEach(btn=>{
    btn.onclick = ()=>{
      const mid = btn.dataset.saveactual;
      const inputs = main.querySelectorAll(`input[data-actual="${mid}"]`);
      const h = inputs[0].value, a = inputs[1].value;
      if(h==="" || a===""){ return; }
      if(!state.actuals) state.actuals = {};
      state.actuals[mid] = [Number(h), Number(a)];
      state.editingActual = null;
      saveState();
      render();
    };
  });

  main.querySelectorAll('[data-editactual]').forEach(el=>{
    el.onclick = ()=>{
      state.editingActual = (state.editingActual===el.dataset.editactual) ? null : el.dataset.editactual;

}

  <div class="rules-box">
    <b>🥉 3e plaats — Kiest de eetplek</b><br>
    De nummer 3 mag bepalen waar de hele groep gaat eten.
  </div>
  <div class="rules-box">
    De eindstand wordt bepaald aan de hand van het totaal aantal punten na alle groepswedstrijden (zie tabblad "Stand").
  </div>`;
}

function renderSpelers(){
  const main = document.getElementById("main");
  document.getElementById("subhead").textContent = "Spelers beheren";

  let html = `<div class="manage-row">
    <input type="text" id="newPlayerName" placeholder="Naam van vriend(in)">
    <button id="addPlayerBtn">Toevoegen</button>
  </div>`;

  state.players.forEach(p=>{
    html += `<div class="player-row">
      <input type="text" class="rename-input" data-rename="${escapeAttr(p)}" value="${escapeAttr(p)}" style="flex:1;margin-right:8px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:0.9rem;">
      ${state.players.length>1?`<span class="remove" data-remove="${escapeAttr(p)}">Verwijderen</span>`:''}
    </div>`;
  });

  html += `<div class="rules-box" style="margin-top:14px;">
    Voeg hier al je vrienden toe. Iedereen vult zijn eigen voorspellingen in via het tabblad "Voorspellen" – kies eerst de naam boven in de lijst.
  </div>`;

  main.innerHTML = html;

  document.getElementById("addPlayerBtn").onclick = ()=>{
    const input = document.getElementById("newPlayerName");
    const name = input.value.trim();
    if(name && !state.players.includes(name)){
      state.players.push(name);
      saveState();
      render();
    }
  };

  main.querySelectorAll('.rename-input').forEach(inp=>{
    inp.addEventListener("change", ()=>{
      const oldName = inp.dataset.rename;
      const newName = inp.value.trim();
      if(!newName || newName===oldName) { inp.value = oldName; return; }
      if(state.players.includes(newName)){ inp.value = oldName; return; }
      // rename in players list
      state.players = state.players.map(p=>p===oldName?newName:p);
      // move predictions
      if(state.predictions[oldName]){
        state.predictions[newName] = state.predictions[oldName];
        delete state.predictions[oldName];
      }
      if(state.current===oldName) state.current = newName;
      if(state.localName===oldName) state.localName = newName;
      saveLocalName(newName);
      saveState();
      render();
    });
  });

  main.querySelectorAll('[data-remove]').forEach(el=>{
    el.onclick = ()=>{
      const name = el.dataset.remove;
      state.players = state.players.filter(p=>p!==name);
      delete state.predictions[name];
      if(state.current===name) state.current = state.players[0];
      saveState();
      render();
    };
  });
}

function renderRegels(){
  const main = document.getElementById("main");
  document.getElementById("subhead").textContent = "Spelregels";

  let configWarning = "";
  if(!CONFIG.API_URL || CONFIG.API_URL.indexOf("http")!==0){
    configWarning = `<div class="rules-box" style="border-color:var(--red);">
      <b style="color:var(--red);">⚠️ Niet verbonden met gedeelde opslag</b><br>
      Vul in de HTML-code bij <code>CONFIG.API_URL</code> de Apps Script Web App URL in, zodat alle spelers dezelfde stand zien.
    </div>`;
  } else if(lastSyncError){
    configWarning = `<div class="rules-box" style="border-color:var(--red);">
      <b style="color:var(--red);">⚠️ Verbindingsprobleem met Google Sheet</b><br>
      ${escapeHtml(lastSyncError)}<br><br>
      Check of de Apps Script Web App URL klopt en of de deployment "Toegang: Iedereen" heeft.
    </div>`;
  } else {
    configWarning = `<div class="rules-box" style="border-color:var(--accent2);">
      <b style="color:var(--accent2);">✓ Verbonden met gedeelde opslag</b>
    </div>`;
  }

  main.innerHTML = configWarning + `
  <div class="rules-box">
    <b>Puntensysteem per wedstrijd</b>
    <ul>
      <li><b>5 punten</b> – exacte uitslag goed (bv. 2-1 voorspeld, 2-1 geworden)</li>
      <li><b>3 punten</b> – juiste uitkomst én juist doelsaldo, maar niet de exacte stand (bv. 2-1 voorspeld, 3-2 geworden)</li>
      <li><b>1 punt</b> – juiste uitkomst (winst/gelijk/verlies), maar verkeerd saldo (bv. 2-0 voorspeld, 1-0 geworden)</li>
      <li><b>0 punten</b> – verkeerde uitkomst</li>
    </ul>
  </div>
  <div class="rules-box">
    <b>Al gespeelde wedstrijden</b><br>
    Wedstrijden die al gespeeld zijn (groen gemarkeerd) hebben een vaste uitslag in het schema. Iedereen die op tijd een voorspelling had ingevuld krijgt daarvoor automatisch punten op de tussenstand. Vul je een voorspelling later nog in voor een gespeelde wedstrijd, dan telt die ook gewoon mee voor jouw punten.
  </div>
  <div class="rules-box">
    <b>Hoe werkt het?</b><br>
    1. Ga naar "Spelers" en voeg iedereen toe.<br>
    2. Kies bovenin "Voorspellen" je eigen naam.<br>
    3. Vul per groep de uitslagen in die jij verwacht.<br>
    4. Check "Stand" voor de actuele ranglijst zodra wedstrijden gespeeld zijn.<br><br>
    Alleen de groepsfase (72 wedstrijden) staat in deze poule. Tip: voeg na de groepsfase de knock-outwedstrijden toe als die bekend zijn.
  </div>`;
}

function bindCommonHandlers(){
  const sw = document.getElementById("switchUserBtn");
  if(sw) sw.onclick = ()=>{ renderLogin(); };
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

/* ---------- LOGIN ---------- */
function renderLogin(){
  const main = document.getElementById("main");
  document.getElementById("tabs").style.display = "none";
  document.getElementById("subhead").textContent = "Wie ben jij?";

  let html = `<div class="rules-box">Kies je naam, of voeg jezelf toe als je er nog niet bij staat. Dit onthouden we op dit toestel.</div>`;
  html += `<div class="player-select">${state.players.map(p=>
    `<button class="player-chip" data-login="${escapeAttr(p)}">${escapeHtml(p)}</button>`
  ).join("")}</div>`;
  html += `<div class="manage-row">
    <input type="text" id="newLoginName" placeholder="Jouw naam">
    <button id="addLoginBtn">Toevoegen &amp; starten</button>
  </div>`;

  main.innerHTML = html;

  main.querySelectorAll('[data-login]').forEach(btn=>{
    btn.onclick = ()=>{
      const name = btn.dataset.login;
      state.current = name;
      saveLocalName(name);
      document.getElementById("tabs").style.display = "";
      render();
    };
  });

  document.getElementById("addLoginBtn").onclick = ()=>{
    const input = document.getElementById("newLoginName");
    const name = input.value.trim();
    if(!name) return;
    if(!state.players.includes(name)) state.players.push(name);
    state.current = name;
    saveLocalName(name);
    saveState();
    document.getElementById("tabs").style.display = "";
    render();
  };
}

/* ---------- INIT ---------- */
(async function(){
  await loadState();
  const localName = await loadLocalName();
  if(localName && state.players.includes(localName)){
    state.current = localName;
    render();
  } else {
    renderLogin();
  }

  // Poll for updates from other players every 20s
  if(CONFIG.API_URL && CONFIG.API_URL.indexOf("http")===0){
    setInterval(async ()=>{
      const before = JSON.stringify({players:state.players, predictions:state.predictions, actuals:state.actuals});
      await loadState();
      const after = JSON.stringify({players:state.players, predictions:state.predictions, actuals:state.actuals});
      if(before!==after) render();
    }, 20000);
  }
})();
</script>
