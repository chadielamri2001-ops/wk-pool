<style>
  :root{
    --bg:#0b1f17;
    --panel:#11281d;
    --panel2:#15301f;
    --line:#2a4a35;
    --accent:#ffb703;
    --accent2:#3ddc84;
    --text:#eef5ee;
    --muted:#9ab6a4;
    --red:#e85d4e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(180deg,#0b1f17 0%, #0e2419 100%);
    color:var(--text);
    padding-bottom:60px;
  }
  header{
    padding:22px 16px 14px;
    text-align:center;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:#0b1f17ee;
    backdrop-filter:blur(6px);
    z-index:10;
  }
  header h1{
    margin:0;
    font-size:1.4rem;
    letter-spacing:0.04em;
    font-weight:800;
  }
  header h1 span{color:var(--accent);}
  header p{margin:4px 0 0;color:var(--muted);font-size:0.85rem;}

  .tabs{
    display:flex;
    gap:6px;
    padding:10px 12px;
    overflow-x:auto;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:62px;
    background:#0b1f17;
    z-index:9;
    -webkit-overflow-scrolling:touch;
  }
  .tab{
    flex:0 0 auto;
    padding:8px 14px;
    border-radius:20px;
    background:var(--panel);
    color:var(--muted);
    border:1px solid var(--line);
    font-size:0.85rem;
    font-weight:600;
    white-space:nowrap;
  }
  .tab.active{
    background:var(--accent);
    color:#1a1300;
    border-color:var(--accent);
  }

  main{padding:14px 12px;max-width:720px;margin:0 auto;}

  .player-select{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  .player-chip{
    padding:7px 13px;
    border-radius:18px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    font-size:0.85rem;
    font-weight:600;
  }
  .player-chip.active{
    background:var(--accent2);
    color:#06251a;
    border-color:var(--accent2);
  }

  .group-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:14px;
    overflow:hidden;
  }
  .group-head{
    padding:10px 14px;
    font-weight:800;
    font-size:0.95rem;
    background:var(--panel2);
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .group-head .teams{
    color:var(--muted);
    font-weight:500;
    font-size:0.75rem;
  }

  .match{
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .match:last-child{border-bottom:none;}
  .match.played{background:rgba(61,220,132,0.05);}

  .match-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:0.7rem;
    color:var(--muted);
  }
  .match-status{
    font-size:0.65rem;
    font-weight:700;
    padding:2px 8px;
    border-radius:10px;
    background:var(--line);
  }
  .match-status.played{
    background:var(--accent2);
    color:#06251a;
  }

  .teams-row{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    gap:8px;
  }
  .team-name{
    font-weight:700;
    font-size:0.95rem;
  }
  .team-name.right{text-align:right;}

  .score-inputs{
    display:flex;
    align-items:center;
    gap:6px;
    justify-content:center;
  }
  .score-inputs input{
    width:38px;
    height:38px;
    text-align:center;
    font-size:1.1rem;
    font-weight:800;
    border-radius:8px;
    border:1px solid var(--line);
    background:#0b1f17;
    color:var(--text);
  }
  .score-inputs input:focus{
    outline:none;
    border-color:var(--accent);
  }
  .score-inputs .dash{color:var(--muted);font-weight:700;}

  .actual-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    font-size:0.8rem;
    color:var(--muted);
    flex-wrap:wrap;
  }
  .actual-row input{
    width:34px;
    height:32px;
    text-align:center;
    border-radius:8px;
    border:1px solid var(--accent2);
    background:rgba(61,220,132,0.08);
    color:var(--accent2);
    font-weight:800;
    font-size:1rem;
  }
  .actual-row .lbl{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }

  .status-line{
    text-align:center;
    font-size:0.72rem;
    font-weight:700;
    min-height:16px;
  }
  .status-line.idle{color:var(--muted);font-weight:500;}
  .status-line.incomplete{color:var(--accent);}
  .status-line.pending{color:var(--muted);}
  .status-line.saved{color:var(--accent2);}
  .status-line.error{color:var(--red);}
  .status-retry-btn{
    margin-left:6px;
    text-decoration:underline;
    cursor:pointer;
  }

  .confirm-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    font-size:0.78rem;
    color:var(--red);
    background:rgba(232,93,78,0.08);
    border:1px solid var(--red);
    border-radius:8px;
    padding:8px;
  }
  .confirm-row button{
    padding:5px 12px;
    border-radius:8px;
    border:none;
    font-weight:700;
    font-size:0.75rem;
  }
  .confirm-yes{background:var(--red);color:#fff;}
  .confirm-no{background:var(--line);color:var(--text);}

  .points-pill{
    align-self:center;
    font-size:0.7rem;
    font-weight:800;
    padding:2px 10px;
    border-radius:10px;
    background:var(--accent);
    color:#1a1300;
  }
  .points-pill.zero{
    background:var(--line);
    color:var(--muted);
  }

  /* Leaderboard */
  .lb-table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .lb-table th, .lb-table td{
    padding:10px 12px;
    text-align:left;
    font-size:0.9rem;
  }
  .lb-table th{
    background:var(--panel2);
    color:var(--muted);
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }
  .lb-table tr:not(:last-child) td{border-bottom:1px solid var(--line);}
  .lb-table td.points{font-weight:800;color:var(--accent);text-align:right;}
  .lb-table td.rank{color:var(--muted);font-weight:800;width:30px;}
  .lb-table tr.you td{background:rgba(255,183,3,0.08);}

  .rules-box{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin-bottom:14px;
    font-size:0.85rem;
    line-height:1.6;
    color:var(--muted);
  }
  .rules-box b{color:var(--text);}
  .rules-box ul{margin:6px 0 0;padding-left:20px;}

  .legend{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    font-size:0.75rem;
    color:var(--muted);
    margin-bottom:10px;
  }
  .legend span{display:flex;align-items:center;gap:5px;}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .dot.green{background:var(--accent2);}
  .dot.gold{background:var(--accent);}

  .empty{
    text-align:center;
    color:var(--muted);
    padding:30px 10px;
    font-size:0.9rem;
  }

  .save-toast{
    position:fixed;
    bottom:16px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--accent2);
    color:#06251a;
    padding:8px 18px;
    border-radius:20px;
    font-weight:700;
    font-size:0.8rem;
    opacity:0;
    transition:all 0.25s ease;
    pointer-events:none;
    max-width:90%;
    text-align:center;
    z-index:50;
  }
  .save-toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .manage-row{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .manage-row input{
    flex:1;
    padding:9px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text);
    font-size:0.9rem;
  }
  .manage-row button{
    padding:9px 16px;
    border-radius:10px;
    border:none;
    background:var(--accent);
    color:#1a1300;
    font-weight:700;
    font-size:0.9rem;
  }
  .player-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:8px;
  }
  .player-row .remove{
    color:var(--red);
    font-weight:700;
    font-size:0.8rem;
    white-space:nowrap;
    margin-left:8px;
  }
  .pending-banner{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    margin-bottom:14px;
    border-radius:14px;
    background:rgba(232,93,78,0.1);
    border:1px solid var(--red);
    font-size:0.82rem;
  }
  .pending-banner b{color:var(--red);}
  .pending-banner .retry-link{
    color:var(--accent);
    font-weight:700;
    cursor:pointer;
    font-size:0.8rem;
  }
</style>
</head>

/* ---------- TIME / LOCKING ---------- */
const MONTH_MAP = {jun:"06", jul:"07"};
function kickoffUTCMillis(m){
  const parts = m.date.split(" ");
  const day = parts[0].padStart(2,"0");
  const month = MONTH_MAP[parts[1]];
  const offsetHours = 2; // CEST geldt voor alle WK 2026 data (jun-jul)
  const iso = `2026-${month}-${day}T${m.time}:00`;
  const localMillis = Date.parse(iso + "Z");
  return localMillis - offsetHours*3600*1000;
}
function isLocked(m){
  if(getActual(m)) return true;
  return Date.now() >= kickoffUTCMillis(m);
}
function isKOLocked(m){
  if(getActual(m)) return true;
  return Date.now() >= kickoffUTCMillis(m);
}

/* ---------- STATE ---------- */
let state = {
  players: ["Jij"],
  current: "Jij",
  predictions: {},
  actuals: {},
  koTeams: {},
  archivedPredictions: {},
  editingActual: null,
  editingTeams: null,
  view: "groep",
  activeGroup: "F",
  queue: [],          // wachtrij van nog niet bevestigde server-acties
  serverAppVersion: null,
};

// matchUI: ephemeral lokale concept-status per wedstrijd, NOOIT door
// synchronisatie overschreven. Dit is de bron van waarheid tijdens het typen.
// matchUI[matchId] = { h, a, status: 'idle'|'incomplete'|'pending'|'saved'|'error'|'confirm-delete', errorMsg }
const matchUI = {};

const STORAGE_KEY_LOCAL_NAME = "wkpool-local-v1";
const QUEUE_KEY = "wkpool-queue-v1";
const RETRY_DELAYS = [2000, 5000, 15000, 30000];
const saveTimers = {};

let lastSyncError = null;

/* ---------- LOCAL NAME (per toestel) ---------- */
function loadLocalName(){
  return new Promise(resolve=>{
    try{
      const v = localStorage.getItem(STORAGE_KEY_LOCAL_NAME);
      resolve(v || null);
    }catch(e){
      resolve(null);
    }
  });
}
function saveLocalName(name){
  try{ localStorage.setItem(STORAGE_KEY_LOCAL_NAME, name); }catch(e){}
}

/* ---------- QUEUE (wachtrij voor mislukte/lopende opslag) ---------- */
function persistQueue(){
  try{
    const simplified = state.queue.map(q=>({id:q.id, action:q.action, payload:q.payload, attempts:q.attempts||0}));
    localStorage.setItem(QUEUE_KEY, JSON.stringify(simplified));
  }catch(e){}
}

function loadQueueFromStorage(){
  try{
    const raw = localStorage.getItem(QUEUE_KEY);
    if(!raw) return [];
    const parsed = JSON.parse(raw);
    if(!Array.isArray(parsed)) return [];
    return parsed.map(rehydrateQueueItem);
  }catch(e){
    return [];
  }
}

// Bouwt generieke success/error-handlers op basis van de actie, zodat een
// wachtrij-item ook na het herladen van de pagina (app gesloten/herstart)
// nog correct kan worden afgehandeld.
function rehydrateQueueItem(raw){
  const item = { id: raw.id, action: raw.action, payload: raw.payload, attempts: raw.attempts||0, status: "error" };
  attachGenericCallbacks(item);
  return item;
}

function attachGenericCallbacks(item){
  item.onSuccess = function(){
    applyConfirmedChange(item.action, item.payload);
    if(item.action === "savePrediction" || item.action === "deletePrediction"){
      const mid = item.payload.matchId;
      if(matchUI[mid]){ matchUI[mid].status = "saved"; updateStatusLineDOM(mid); }
    }
    render();
  };
  item.onError = function(errMsg){
    if(item.action === "savePrediction" || item.action === "deletePrediction"){
      const mid = item.payload.matchId;
      if(matchUI[mid]){ matchUI[mid].status = "error"; matchUI[mid].errorMsg = errMsg; updateStatusLineDOM(mid); }
    }
  };
}

function applyConfirmedChange(action, payload){
  if(action === "savePrediction"){
    if(!state.predictions[payload.player]) state.predictions[payload.player] = {};
    state.predictions[payload.player][payload.matchId] = payload.score;
  } else if(action === "deletePrediction"){
    if(state.predictions[payload.player]) delete state.predictions[payload.player][payload.matchId];
  } else if(action === "saveActual"){
    if(!state.actuals) state.actuals = {};
    state.actuals[payload.matchId] = payload.score;
  } else if(action === "saveTeams"){
    if(!state.koTeams) state.koTeams = {};
    state.koTeams[payload.matchId] = payload.teams;
  } else if(action === "addPlayer"){
    if(!state.players.includes(payload.name)) state.players.push(payload.name);
  } else if(action === "renamePlayer"){
    state.players = state.players.map(p=>p===payload.oldName?payload.newName:p);
    if(state.predictions[payload.oldName]){
      state.predictions[payload.newName] = state.predictions[payload.oldName];
      delete state.predictions[payload.oldName];
    }
    if(state.current===payload.oldName){ state.current = payload.newName; saveLocalName(payload.newName); }
  } else if(action === "removePlayer"){
    state.players = state.players.filter(p=>p!==payload.name);
    if(state.predictions[payload.name]){
      if(!state.archivedPredictions) state.archivedPredictions = {};
      state.archivedPredictions[payload.name] = state.predictions[payload.name];
      delete state.predictions[payload.name];
    }
  }
}

function queueAndSend(action, payload, opts){
  opts = opts || {};
  const id = "q" + Date.now() + Math.random().toString(36).slice(2,8);
  const item = { id, action, payload, attempts:0, status:"sending" };
  attachGenericCallbacks(item);
  if(opts.onSuccessExtra) { const base = item.onSuccess; item.onSuccess = function(){ base(); opts.onSuccessExtra(); }; }
  if(opts.onErrorExtra) { const base = item.onError; item.onError = function(e){ base(e); opts.onErrorExtra(e); }; }
  state.queue.push(item);
  persistQueue();
  attemptQueueItem(item);
  return item;
}

function attemptQueueItem(item){
  if(!CONFIG.API_URL || CONFIG.API_URL.indexOf("http")!==0){
    handleQueueItemFailure(item, "Geen API URL geconfigureerd");
    return;
  }
  item.status = "sending";
  fetch(CONFIG.API_URL, {
    method: "POST",
    headers: {"Content-Type": "text/plain;charset=utf-8"},
    body: JSON.stringify(Object.assign({action: item.action}, item.payload))
  }).then(r=>{
    return r.text().then(text=>{
      let body;
      try{ body = JSON.parse(text); }catch(e){ body = null; }
      return { httpOk: r.ok, body };
    });
  }).then(({httpOk, body})=>{
    if(httpOk && body && body.ok === true){
      removeFromQueue(item.id);
      lastSyncError = null;
      if(item.onSuccess) item.onSuccess(body);
    } else {
      const errMsg = (body && body.error) ? body.error : ("HTTP " + (httpOk ? "ok-maar-geen-bevestiging" : "fout"));
      handleQueueItemFailure(item, errMsg);
    }
  }).catch(err=>{
    handleQueueItemFailure(item, err.message);
  });
}

function handleQueueItemFailure(item, errMsg){
  item.attempts = (item.attempts||0) + 1;
  item.lastError = errMsg;
  item.status = "error";
  persistQueue();
  lastSyncError = "Opslaan mislukt: " + errMsg;
  if(item.onError) item.onError(errMsg);
  if(item.attempts <= RETRY_DELAYS.length){
    const delay = RETRY_DELAYS[item.attempts-1];
    setTimeout(()=>{
      if(state.queue.find(q=>q.id===item.id)) attemptQueueItem(item);
    }, delay);
  }
  if(document.getElementById("main")) renderPendingBannerIfPresent();
}

function removeFromQueue(id){
  state.queue = state.queue.filter(q=>q.id!==id);
  persistQueue();
}

function retryAllQueueItems(){
  state.queue.forEach(item=>attemptQueueItem(item));
}

/* ---------- LOAD (GET) ---------- */
function isValidServerShape(data){
  return data && typeof data === "object" &&
    Array.isArray(data.players) &&
    typeof data.predictions === "object" &&
    typeof data.actuals === "object" &&
    typeof data.koTeams === "object";
}

function loadState(){
  return new Promise(resolve=>{
    if(!CONFIG.API_URL || CONFIG.API_URL.indexOf("http")!==0){
      resolve();
      return;
    }
    fetch(CONFIG.API_URL)
      .then(r=>{
        if(!r.ok) throw new Error("HTTP "+r.status);
        return r.json();
      })
      .then(data=>{
        if(!isValidServerShape(data)){
          lastSyncError = "Server gaf onverwachte data terug (genegeerd, lokale data behouden)";
          resolve();
          return;
        }
        state.players = data.players;
        state.predictions = data.predictions;
        state.actuals = data.actuals;
        state.koTeams = data.koTeams;
        state.archivedPredictions = data.archivedPredictions || {};
        state.serverAppVersion = data.appVersion || null;
        lastSyncError = null;
        resolve();
      })
      .catch(err=>{
        lastSyncError = "Laden mislukt: " + err.message;
        resolve();
      });
  });
}

let toastTimer=null;
function showToast(text, isError){
  const t = document.getElementById("toast");
  t.textContent = text;
  t.style.background = isError ? "var(--red)" : "var(--accent2)";
  t.style.color = isError ? "#fff" : "#06251a";
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), isError?3000:1300);
}

function getActual(m){
  const override = state.actuals && state.actuals[m.id];
  if(override) return override;
  return m.actual;
}

// 5 punten: exacte uitslag / 3 punten: juist verschil / 1 punt: juiste uitkomst / 0: fout
function calcPoints(pred, actual){
  if(!pred || !actual) return null;
  const [ph,pa] = pred;
  const [ah,aa] = actual;
  if(ph===""||pa===""||ph===null||pa===null||ph===undefined||pa===undefined) return null;
  const PH=Number(ph), PA=Number(pa), AH=Number(ah), AA=Number(aa);
  if(isNaN(PH)||isNaN(PA)) return null;
  if(PH===AH && PA===AA) return 5;
  const predDiff = PH-PA;
  const actDiff = AH-AA;
  const predOutcome = Math.sign(predDiff);
  const actOutcome = Math.sign(actDiff);
  if(predOutcome!==actOutcome) return 0;
  if(predDiff===actDiff) return 3;
  return 1;
}

function getPred(player, matchId){
  const p = state.predictions[player];
  if(!p) return [null,null];
  return p[matchId] || [null,null];
}

/* ---------- MATCH UI (de kern van de bugfix) ----------
   matchUI houdt de lokale concept-waarden bij tijdens het typen.
   Dit object wordt NOOIT door synchronisatie (polling) overschreven,
   dus een binnenkomende update van een andere speler kan nooit
   verwijderen wat jij net aan het invullen bent.
*/
function ensureMatchUI(matchId, player){
  if(!matchUI[matchId]){
    const saved = getPred(player, matchId);
    matchUI[matchId] = { h: saved[0]===null?"":String(saved[0]), a: saved[1]===null?"":String(saved[1]), status:"idle", errorMsg:null };
  }
  return matchUI[matchId];
}

function getDisplayValue(matchId, idx, player){
  if(matchUI[matchId]){
    return idx===0 ? matchUI[matchId].h : matchUI[matchId].a;
  }
  const saved = getPred(player, matchId);
  return saved[idx]===null||saved[idx]===undefined ? "" : String(saved[idx]);
}

function statusLabel(ui){
  if(!ui) return "";
  if(ui.status==="idle") return "";
  if(ui.status==="incomplete") return "Vul beide scores in";
  if(ui.status==="pending") return "Opslaan…";
  if(ui.status==="saved") return "Opgeslagen ✓";
  if(ui.status==="error") return "Fout — " + (ui.errorMsg||"onbekend") ;
  if(ui.status==="confirm-delete") return "";
  return "";
}

function updateStatusLineDOM(matchId){
  const el = document.querySelector(`[data-statusline="${matchId}"]`);
  if(!el) return; // gebruiker heeft mogelijk de wedstrijdlijst verlaten, geen probleem
  const ui = matchUI[matchId];
  if(!ui){ el.innerHTML = ""; el.className = "status-line"; return; }

  if(ui.status === "confirm-delete"){
    el.className = "status-line";
    el.innerHTML = `<span class="confirm-row">Voorspelling verwijderen?
      <button class="confirm-yes" data-confirmdel="${matchId}">Ja, verwijder</button>
      <button class="confirm-no" data-canceldel="${matchId}">Annuleer</button></span>`;
    bindStatusLineButtons(matchId);
    return;
  }

  el.className = "status-line " + ui.status;
  let html = statusLabel(ui);
  if(ui.status==="error"){
    html += `<span class="status-retry-btn" data-retrymatch="${matchId}">opnieuw proberen</span>`;
  }
  el.innerHTML = html;
  bindStatusLineButtons(matchId);
}

function bindStatusLineButtons(matchId){
  const el = document.querySelector(`[data-statusline="${matchId}"]`);
  if(!el) return;
  const retryBtn = el.querySelector(`[data-retrymatch="${matchId}"]`);
  if(retryBtn) retryBtn.onclick = ()=> retryMatchSave(matchId);
  const yesBtn = el.querySelector(`[data-confirmdel="${matchId}"]`);
  if(yesBtn) yesBtn.onclick = ()=> confirmDeletePrediction(matchId);
  const noBtn = el.querySelector(`[data-canceldel="${matchId}"]`);
  if(noBtn) noBtn.onclick = ()=> cancelDeletePrediction(matchId);
}

function retryMatchSave(matchId){
  const ui = matchUI[matchId];
  if(!ui) return;
  const existing = state.queue.find(q=> (q.action==="savePrediction"||q.action==="deletePrediction") && q.payload.matchId===matchId);
  if(existing){ attemptQueueItem(existing); ui.status="pending"; updateStatusLineDOM(matchId); return; }
  scheduleAutoSave(matchId, true);
}

// Wordt aangeroepen bij elke "input" event op een scorevakje.
function handleScoreInput(matchId, idx, rawValue){
  const player = state.current;
  const ui = ensureMatchUI(matchId, player);
  const cleaned = rawValue.replace(/[^0-9]/g, "").slice(0,2);
  if(idx===0) ui.h = cleaned; else ui.a = cleaned;
  ui.status = "idle";
  scheduleAutoSave(matchId, false);
}

function scheduleAutoSave(matchId, immediate){
  clearTimeout(saveTimers[matchId]);
  const run = ()=> evaluateAndSave(matchId);
  if(immediate) run();
  else saveTimers[matchId] = setTimeout(run, 600);
}

function evaluateAndSave(matchId){
  const player = state.current;
  const ui = matchUI[matchId];
  if(!ui) return;
  const hRaw = ui.h, aRaw = ui.a;
  const hasH = hRaw !== "" && hRaw !== null && hRaw !== undefined;
  const hasA = aRaw !== "" && aRaw !== null && aRaw !== undefined;
  const savedPred = getPred(player, matchId);
  const hadSaved = savedPred[0] !== null && savedPred[1] !== null;

  if(!hasH && !hasA){
    if(hadSaved){
      ui.status = "confirm-delete";
      updateStatusLineDOM(matchId);
    } else {
      ui.status = "idle";
      updateStatusLineDOM(matchId);
    }
    return;
  }
  if(!hasH || !hasA){
    ui.status = "incomplete";
    updateStatusLineDOM(matchId);
    return;
  }
  const h = Number(hRaw), a = Number(aRaw);
  if(!Number.isInteger(h) || !Number.isInteger(a) || h<0 || a<0){
    ui.status = "incomplete";
    updateStatusLineDOM(matchId);
    return;
  }
  // Beide velden geldig gevuld -> nu pas centraal opslaan.
  ui.status = "pending";
  updateStatusLineDOM(matchId);
  queueAndSend("savePrediction", { player, matchId, score:[h,a] });
}

function confirmDeletePrediction(matchId){
  const player = state.current;
  const ui = matchUI[matchId];
  if(!ui) return;
  ui.status = "pending";
  updateStatusLineDOM(matchId);
  queueAndSend("deletePrediction", { player, matchId }, {
    onSuccessExtra: ()=>{ ui.h=""; ui.a=""; }
  });
}

function cancelDeletePrediction(matchId){
  const player = state.current;
  const saved = getPred(player, matchId);
  const ui = matchUI[matchId];
  if(!ui) return;
  ui.h = saved[0]===null?"":String(saved[0]);
  ui.a = saved[1]===null?"":String(saved[1]);
  ui.status = (saved[0]!==null && saved[1]!==null) ? "saved" : "idle";
  render();
}

      }
    }

  bindScoreInputs(main);

// Cruciaal: "input" event, NOOIT render() binnen deze handler aanroepen.
// Alleen handleScoreInput + een gerichte DOM-update van de statusregel.
function bindScoreInputs(main){
  main.querySelectorAll('input[data-match]').forEach(inp=>{
    inp.addEventListener("input", ()=>{
      handleScoreInput(inp.dataset.match, Number(inp.dataset.idx), inp.value);
    });
  });
}

function bindActualHandlers(main){
  main.querySelectorAll('[data-saveactual]').forEach(btn=>{
    btn.onclick = ()=>{
      const mid = btn.dataset.saveactual;
      const inputs = main.querySelectorAll(`input[data-actual="${mid}"]`);
      const h = inputs[0].value, a = inputs[1].value;
      if(h==="" || a===""){ return; }
      const hN = Number(h), aN = Number(a);
      if(!Number.isInteger(hN) || !Number.isInteger(aN) || hN<0 || aN<0) return;
      const statusEl = document.querySelector(`[data-statusline="actual-${mid}"]`);
      if(statusEl){ statusEl.className="status-line pending"; statusEl.textContent="Opslaan…"; }
      queueAndSend("saveActual", { matchId: mid, score:[hN,aN] }, {
        onSuccessExtra: ()=>{ state.editingActual = null; render(); },
        onErrorExtra: (err)=>{ if(statusEl){ statusEl.className="status-line error"; statusEl.textContent="Fout — "+err; } }
      });
    };
  });

  main.querySelectorAll('[data-editactual]').forEach(el=>{
    el.onclick = ()=>{
      state.editingActual = (state.editingActual===el.dataset.editactual) ? null : el.dataset.editactual;
      render();
    };
  });
}

function bindCommonHandlers(){
  const sw = document.getElementById("switchUserBtn");
  if(sw) sw.onclick = ()=>{ renderLogin(); };
  const retryAll = document.getElementById("retryAllBtn");
  if(retryAll) retryAll.onclick = ()=>{ retryAllQueueItems(); };
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

/* ---------- STAND ---------- */
function renderStand(){
  const main = document.getElementById("main");
  document.getElementById("subhead").textContent = "Tussenstand";

  const allMatches = MATCHES.concat(KNOCKOUT_MATCHES.filter(m=>state.koTeams && state.koTeams[m.id]));
  const rows = state.players.map(p=>{
    let total = 0, played = 0, exact = 0;
    allMatches.forEach(m=>{
      const actual = getActual(m);
      if(!actual) return;
      const pred = getPred(p, m.id);
      const pts = calcPoints(pred, actual);
      if(pts!==null){
        played++;
        total += pts;
        if(pts===5) exact++;
      }
    });
    return { player:p, total, played, exact };
  }).sort((a,b)=> b.total - a.total);

  let html = `<table class="lb-table"><thead><tr>
    <th>#</th><th>Speler</th><th>Voorspeld</th><th>Exact</th><th>Punten</th>
  </tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    html += `<tr class="${r.player===state.current?'you':''}">
      <td class="rank">${i+1}</td>
      <td>${escapeHtml(r.player)}</td>
      <td>${r.played}</td>
      <td>${r.exact}</td>
      <td class="points">${r.total}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  main.innerHTML = html;
}

function renderSpelers(){
  const main = document.getElementById("main");
  document.getElementById("subhead").textContent = "Spelers beheren";

  let html = `<div class="manage-row">
    <input type="text" id="newPlayerName" placeholder="Naam van vriend(in)">
    <button id="addPlayerBtn">Toevoegen</button>
  </div>`;

  state.players.forEach(p=>{
    html += `<div class="player-row">
      <input type="text" class="rename-input" data-rename="${escapeAttr(p)}" value="${escapeAttr(p)}" style="flex:1;margin-right:8px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:0.9rem;">
      ${state.players.length>1?`<span class="remove" data-remove="${escapeAttr(p)}">Verwijderen</span>`:''}
    </div>`;
  });

  html += `<div class="rules-box" style="margin-top:14px;">
    Voeg hier al je vrienden toe. Iedereen vult zijn eigen voorspellingen in via het tabblad "Groepsfase" – kies eerst de naam boven in de lijst. Verwijderen archiveert de voorspellingen van die speler (ze worden niet definitief gewist).
  </div>`;

  main.innerHTML = html;

  document.getElementById("addPlayerBtn").onclick = ()=>{
    const input = document.getElementById("newPlayerName");
    const name = input.value.trim();
    if(!name) return;
    if(state.players.some(p=>p.toLowerCase()===name.toLowerCase())){
      showToast("Deze naam bestaat al", true);
      return;
    }
    input.disabled = true;
    queueAndSend("addPlayer", { name }, {
      onSuccessExtra: ()=>{ showToast("Toegevoegd ✓"); render(); },
      onErrorExtra: (err)=>{ input.disabled=false; showToast("Mislukt: "+err, true); }
    });
  };

  main.querySelectorAll('.rename-input').forEach(inp=>{
    inp.addEventListener("change", ()=>{
      const oldName = inp.dataset.rename;
      const newName = inp.value.trim();
      if(!newName || newName===oldName) { inp.value = oldName; return; }
      if(state.players.some(p=>p.toLowerCase()===newName.toLowerCase())){
        showToast("Naam al in gebruik", true);
        inp.value = oldName;
        return;
      }
      inp.disabled = true;
      queueAndSend("renamePlayer", { oldName, newName }, {
        onSuccessExtra: ()=>{ showToast("Hernoemd ✓"); render(); },
        onErrorExtra: (err)=>{ inp.disabled=false; inp.value=oldName; showToast("Mislukt: "+err, true); }
      });
    });
  });

  main.querySelectorAll('[data-remove]').forEach(el=>{
    el.onclick = ()=>{
      const name = el.dataset.remove;
      if(!confirm(`Weet je zeker dat je "${name}" wilt verwijderen?\n\nDe voorspellingen van deze speler worden gearchiveerd, niet definitief gewist.`)) return;
      queueAndSend("removePlayer", { name }, {
        onSuccessExtra: ()=>{ showToast("Verwijderd ✓"); render(); },
        onErrorExtra: (err)=>{ showToast("Mislukt: "+err, true); }
      });
    };
  });
}

  document.getElementById("addLoginBtn").onclick = ()=>{
    const input = document.getElementById("newLoginName");
    const name = input.value.trim();
    if(!name) return;
    const exists = state.players.some(p=>p.toLowerCase()===name.toLowerCase());
    state.current = name;
    saveLocalName(name);
    document.getElementById("tabs").style.display = "";
    if(exists){
      render();
      return;
    }
    input.disabled = true;
    queueAndSend("addPlayer", { name }, {
      onSuccessExtra: ()=>{ render(); },
      onErrorExtra: ()=>{ render(); } // speler kan nog meedoen, alleen niet bevestigd in de spelerslijst; retry-banner toont dit
    });
    render();
  };
}

/* ---------- INIT ---------- */
(async function(){
  state.queue = loadQueueFromStorage();
  await loadState();
  // Direct bij opstarten proberen we eventuele niet-verzonden wijzigingen
  // (bv. door het sluiten van de app tijdens het opslaan) opnieuw te sturen.
  state.queue.forEach(item=>attemptQueueItem(item));

  const localName = await loadLocalName();
  if(localName && state.players.includes(localName)){
    state.current = localName;
    render();
  } else {
    renderLogin();
  }

  if(CONFIG.API_URL && CONFIG.API_URL.indexOf("http")===0){
    setInterval(async ()=>{
      const before = JSON.stringify({players:state.players, predictions:state.predictions, actuals:state.actuals, koTeams:state.koTeams});
      await loadState();
      const after = JSON.stringify({players:state.players, predictions:state.predictions, actuals:state.actuals, koTeams:state.koTeams});
      if(before!==after){
        const active = document.activeElement;
        const isTypingScore = active && active.matches && active.matches('input[data-match]');
        if(!isTypingScore) render();
        // Als de gebruiker wel aan het typen is: de nieuwe serverdata staat
        // nu in state.predictions/actuals/koTeams en wordt zichtbaar bij de
        // volgende render(); matchUI (wat nu op het scherm staat) blijft
        // intussen ongewijzigd, dus er gaat niets verloren.
      }
    }, 20000);
  }
})();
</script>
