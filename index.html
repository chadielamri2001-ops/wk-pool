<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<title>WK 2026 Voorspelpoule</title>
<style>
  :root{
    color-scheme:dark;
    --bg:#070b14;
    --bg-soft:#0b1120;
    --panel:rgba(17,24,39,.86);
    --panel-solid:#111827;
    --panel2:#162033;
    --line:rgba(148,163,184,.16);
    --line-strong:rgba(148,163,184,.28);
    --accent:#6ea8fe;
    --accent-strong:#3b82f6;
    --accent2:#45d6b0;
    --text:#f8fafc;
    --muted:#94a3b8;
    --red:#fb7185;
    --warning:#fbbf24;
    --shadow:0 18px 50px rgba(0,0,0,.28);
    --shadow-soft:0 8px 24px rgba(0,0,0,.18);
    --radius:20px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;background:var(--bg);}
  body{
    margin:0;
    min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(circle at 15% -10%,rgba(59,130,246,.22),transparent 34%),
      radial-gradient(circle at 90% 4%,rgba(69,214,176,.12),transparent 28%),
      linear-gradient(180deg,#080d18 0%,#070b14 55%,#080c15 100%);
    color:var(--text);
    padding-bottom:76px;
  }
  button,input{font:inherit;}
  button{cursor:pointer;}
  header{
    padding:20px 16px 16px;
    text-align:left;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:rgba(7,11,20,.78);
    backdrop-filter:blur(22px) saturate(155%);
    -webkit-backdrop-filter:blur(22px) saturate(155%);
    z-index:20;
  }
  .header-inner{max-width:1040px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .brand{min-width:0;}
  header h1{margin:0;font-size:clamp(1.18rem,3vw,1.55rem);letter-spacing:-.035em;font-weight:850;line-height:1.1;}
  header h1 span{color:var(--accent);}
  header p{margin:6px 0 0;color:var(--muted);font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sync-status{display:flex;align-items:center;gap:7px;flex:0 0 auto;padding:8px 11px;border:1px solid var(--line);background:rgba(255,255,255,.035);border-radius:999px;color:var(--muted);font-size:.72rem;font-weight:750;box-shadow:inset 0 1px rgba(255,255,255,.05);}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 0 4px rgba(69,214,176,.10);}
  .sync-status.saving .sync-dot{background:var(--warning);box-shadow:0 0 0 4px rgba(251,191,36,.10);animation:pulse 1s infinite;}
  .sync-status.error .sync-dot{background:var(--red);box-shadow:0 0 0 4px rgba(251,113,133,.10);}
  @keyframes pulse{50%{opacity:.4;}}

  .tabs{
    display:flex;gap:8px;padding:11px 14px;overflow-x:auto;border-bottom:1px solid var(--line);
    position:sticky;top:77px;background:rgba(8,13,24,.88);backdrop-filter:blur(18px);z-index:15;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;padding:10px 15px;border-radius:12px;background:transparent;color:var(--muted);border:1px solid transparent;font-size:.83rem;font-weight:720;white-space:nowrap;transition:.18s ease;}
  .tab:hover{color:var(--text);background:rgba(255,255,255,.045);}
  .tab.active{background:linear-gradient(180deg,rgba(110,168,254,.22),rgba(59,130,246,.12));color:#dbeafe;border-color:rgba(110,168,254,.32);box-shadow:inset 0 1px rgba(255,255,255,.08),0 8px 18px rgba(37,99,235,.12);}

  main{padding:18px 14px;max-width:900px;margin:0 auto;}
  .player-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .player-chip{min-height:42px;padding:9px 14px;border-radius:13px;background:rgba(17,24,39,.72);border:1px solid var(--line);color:var(--text);font-size:.84rem;font-weight:700;box-shadow:inset 0 1px rgba(255,255,255,.035);transition:.18s ease;}
  .player-chip:hover{transform:translateY(-1px);border-color:var(--line-strong);}
  .player-chip.active{background:linear-gradient(180deg,rgba(69,214,176,.22),rgba(69,214,176,.10));color:#bdf8e9;border-color:rgba(69,214,176,.34);}

  .group-card,.rules-box,.lb-table,.player-row{
    background:linear-gradient(180deg,rgba(20,29,47,.92),rgba(13,20,34,.92));
    border:1px solid var(--line);box-shadow:var(--shadow-soft),inset 0 1px rgba(255,255,255,.045);
  }
  .group-card{border-radius:var(--radius);margin-bottom:18px;overflow:hidden;}
  .group-head{padding:15px 16px;font-weight:820;font-size:.96rem;background:rgba(255,255,255,.025);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .group-head .teams{color:var(--muted);font-weight:560;font-size:.72rem;text-align:right;line-height:1.35;}
  .match{padding:15px 16px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:11px;transition:.18s ease;}
  .match:last-child{border-bottom:none;}
  .match.played{background:linear-gradient(90deg,rgba(69,214,176,.055),transparent 54%);}
  .match-top{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:var(--muted);}
  .match-status{font-size:.62rem;font-weight:820;letter-spacing:.04em;padding:4px 8px;border-radius:999px;background:rgba(148,163,184,.10);border:1px solid var(--line);}
  .match-status.played{background:rgba(69,214,176,.13);color:#8ff0d4;border-color:rgba(69,214,176,.24);}
  .match-status.live{background:rgba(251,191,36,.14);color:#fde68a;border-color:rgba(251,191,36,.34);}
  .teams-row{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:10px;}
  .team-name{font-weight:760;font-size:.94rem;line-height:1.25;overflow-wrap:anywhere;}
  .team-name.right{text-align:right;}
  .score-inputs{display:flex;align-items:center;gap:7px;justify-content:center;}
  .score-inputs input,.actual-row input[type="number"]{width:46px;height:46px;text-align:center;font-size:1.08rem;font-weight:830;border-radius:13px;border:1px solid var(--line-strong);background:rgba(3,7,18,.54);color:var(--text);box-shadow:inset 0 1px 5px rgba(0,0,0,.22);}
  .score-inputs input:focus,.actual-row input:focus,.manage-row input:focus,.rename-input:focus{outline:none;border-color:rgba(110,168,254,.72);box-shadow:0 0 0 4px rgba(59,130,246,.13);}
  input:disabled{opacity:.48;cursor:not-allowed;}
  .score-inputs .dash{color:var(--muted);font-weight:750;}
  .actual-row{display:flex;justify-content:center;align-items:center;gap:8px;font-size:.8rem;color:var(--muted);flex-wrap:wrap;}
  .actual-row .lbl{font-size:.67rem;text-transform:uppercase;letter-spacing:.055em;font-weight:760;}
  .points-pill{align-self:center;font-size:.69rem;font-weight:850;padding:5px 10px;border-radius:999px;background:rgba(110,168,254,.15);border:1px solid rgba(110,168,254,.24);color:#b9d5ff;}
  .points-pill.zero{background:rgba(148,163,184,.08);border-color:var(--line);color:var(--muted);}

  .lb-table{width:100%;border-collapse:separate;border-spacing:0;border-radius:var(--radius);overflow:hidden;}
  .lb-table th,.lb-table td{padding:13px 13px;text-align:left;font-size:.88rem;}
  .lb-table th{background:rgba(255,255,255,.025);color:var(--muted);font-size:.66rem;text-transform:uppercase;letter-spacing:.065em;}
  .lb-table tr:not(:last-child) td{border-bottom:1px solid var(--line);}
  .lb-table td.points{font-weight:850;color:#b9d5ff;text-align:right;}
  .lb-table td.rank{color:var(--muted);font-weight:820;width:34px;}
  .lb-table tr.you td{background:rgba(59,130,246,.075);}
  .rules-box{border-radius:var(--radius);padding:16px;margin-bottom:15px;font-size:.84rem;line-height:1.65;color:var(--muted);}
  .rules-box b{color:var(--text);}
  .rules-box ul{margin:7px 0 0;padding-left:20px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:.73rem;color:var(--muted);margin-bottom:12px;}
  .legend span{display:flex;align-items:center;gap:6px;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}.dot.green{background:var(--accent2);}.dot.gold{background:var(--accent);}
  .empty{text-align:center;color:var(--muted);padding:36px 12px;font-size:.9rem;}
  .save-toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#d9fff4;color:#06251a;padding:10px 16px;border-radius:999px;font-weight:780;font-size:.78rem;opacity:0;transition:.22s ease;pointer-events:none;z-index:50;box-shadow:0 15px 36px rgba(0,0,0,.32);}
  .save-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .manage-row{display:flex;gap:9px;margin-bottom:15px;}
  .manage-row input,.rename-input{flex:1;min-width:0;padding:12px 13px;border-radius:13px;border:1px solid var(--line);background:rgba(17,24,39,.72);color:var(--text);font-size:.9rem;}
  .manage-row button,.save-actual-btn{min-height:44px;padding:10px 15px;border-radius:13px;border:1px solid rgba(110,168,254,.28)!important;background:linear-gradient(180deg,#74adff,#4d8df4)!important;color:#06152d!important;font-weight:820!important;box-shadow:0 8px 20px rgba(37,99,235,.22),inset 0 1px rgba(255,255,255,.35);}
  .player-row{display:flex;justify-content:space-between;align-items:center;border-radius:15px;padding:10px 12px;margin-bottom:9px;}
  .player-row .remove{color:var(--red);font-weight:760;font-size:.78rem;padding:8px;cursor:pointer;}
  code{background:rgba(255,255,255,.06);padding:2px 5px;border-radius:6px;}


  .dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
  .stat-card{background:linear-gradient(180deg,rgba(20,29,47,.94),rgba(13,20,34,.94));border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:var(--shadow-soft),inset 0 1px rgba(255,255,255,.045);}
  .stat-value{font-size:1.45rem;font-weight:900;letter-spacing:-.04em;}
  .stat-label{margin-top:4px;color:var(--muted);font-size:.72rem;font-weight:700;}
  .progress-track{height:9px;border-radius:999px;background:rgba(148,163,184,.12);overflow:hidden;margin:12px 0 4px;}
  .progress-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--accent-strong),var(--accent2));}
  .section-title{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:18px 2px 10px;font-size:.92rem;font-weight:850;}
  .match-actions{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
  .other-picks{margin-top:4px;padding-top:9px;border-top:1px dashed var(--line);display:flex;gap:6px;flex-wrap:wrap;}
  .pick-chip{padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line);font-size:.68rem;color:var(--muted);}
  .pick-chip b{color:var(--text);}
  .mini-btn{flex:0 0 auto;min-height:38px;padding:8px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(17,24,39,.72);color:var(--muted);font-size:.76rem;font-weight:760;}
  .schedule-note{padding:12px 14px;margin-bottom:10px;}
  .schedule-list{overflow:hidden;}
  .schedule-match{gap:9px;}
  .schedule-top{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:.72rem;color:var(--muted);}
  .schedule-time{font-weight:900;color:var(--text);font-size:.9rem;}
  .schedule-id{font-weight:780;color:var(--muted);}
  .schedule-pick{display:flex;align-items:center;justify-content:space-between;gap:8px;color:var(--muted);font-size:.72rem;font-weight:760;}
  .schedule-pick b{color:var(--text);font-size:.88rem;}
  .schedule-score.live{color:#fde68a;}
  .schedule-score.final{color:#8ff0d4;}

  @media(max-width:700px){
    body{padding-bottom:92px;}
    header{padding:15px 13px 13px;}
    .sync-status{padding:7px 9px;}.sync-status span:last-child{display:none;}
    .tabs{position:fixed;left:0;right:0;bottom:0;top:auto;z-index:40;border-top:1px solid var(--line);border-bottom:0;padding:8px 8px calc(8px + env(safe-area-inset-bottom));justify-content:space-around;background:rgba(7,11,20,.92);box-shadow:0 -12px 30px rgba(0,0,0,.28);}
    .tab{flex:1;min-width:0;padding:7px 3px;border-radius:11px;font-size:.58rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:52px;}
    .tab .tab-icon{font-size:1.05rem;line-height:1;}.tab .tab-label{display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;}.tab.active{background:rgba(59,130,246,.16);}
    .dashboard-grid{grid-template-columns:repeat(3,1fr);gap:8px}.stat-card{padding:12px 10px}.stat-value{font-size:1.16rem}.stat-label{font-size:.62rem}
    main{padding:14px 10px;}
    .group-head{align-items:flex-start;}.group-head .teams{max-width:68%;}
    .match{padding:14px 12px;}
    .team-name{font-size:.86rem;}
    .score-inputs input,.actual-row input[type="number"]{width:44px;height:44px;}
    .schedule-note{padding:10px 12px;font-size:.78rem;line-height:1.45;}
    .schedule-match{padding:11px 10px;gap:8px;}
    .schedule-top{font-size:.68rem;}
    .schedule-time{font-size:.86rem;}
    .schedule-match .teams-row{grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:6px;}
    .schedule-match .team-name{font-size:.78rem;line-height:1.18;}
    .schedule-match .score-inputs{gap:4px;}
    .schedule-match .score-inputs input{width:38px;height:40px;border-radius:11px;font-size:.95rem;}
    .schedule-pick{font-size:.66rem;padding-top:2px;}
    .schedule-pick b{font-size:.8rem;}
    .manage-row{flex-direction:column;}.manage-row button{width:100%;}
    .lb-table{display:block;overflow-x:auto;white-space:nowrap;}
    .rules-box{border-radius:17px;padding:14px;}
  }
  @media(max-width:390px){
    .teams-row{gap:6px;}.team-name{font-size:.79rem;}.score-inputs{gap:4px;}.score-inputs input{width:40px;height:42px;}
  }
</style>
</head>

/* ---------- TIME / LOCKING ---------- */
// All match dates are "DD jun"/"DD jul" 2026, times are NL local time (Europe/Amsterdam).
const MONTH_MAP = {jun:"06", jul:"07"};
function kickoffUTCMillis(m){
  const parts = m.date.split(" "); // ["11","jun"]
  const day = parts[0].padStart(2,"0");
  const month = MONTH_MAP[parts[1]];
  // Build an ISO string and ask: what UTC instant corresponds to this wall-clock
  // time in Europe/Amsterdam? We do this by formatting a guess and adjusting
  // for the Amsterdam offset (CET=+1 / CEST=+2). June/July = CEST = +2.
  const offsetHours = 2; // CEST applies for all WK 2026 group stage dates (Jun-Jul)
  const iso = `2026-${month}-${day}T${m.time}:00`;
  const localMillis = Date.parse(iso + "Z"); // treat as if UTC, then shift
  return localMillis - offsetHours*3600*1000; // actual UTC instant
}
function isLocked(m){
  if(getActual(m)) return true;
  return Date.now() >= kickoffUTCMillis(m);
}
function isKOLocked(m){
  if(getActual(m)) return true;
  return Date.now() >= kickoffUTCMillis(m);
}

function amsterdamDatePartsFromMillis(ms){
  const parts = new Intl.DateTimeFormat('nl-NL', {
    timeZone: 'Europe/Amsterdam',
    weekday: 'long',
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  }).formatToParts(new Date(ms));
  const values = {};
  parts.forEach(p=>{ if(p.type !== 'literal') values[p.type] = p.value; });
  return values;
}
function amsterdamDateKeyFromMillis(ms){
  const parts = new Intl.DateTimeFormat('sv-SE', {
    timeZone: 'Europe/Amsterdam',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  }).formatToParts(new Date(ms));
  const values = {};
  parts.forEach(p=>{ if(p.type !== 'literal') values[p.type] = p.value; });
  return values.year + '-' + values.month + '-' + values.day;
}
function matchDateKey(m){ return amsterdamDateKeyFromMillis(kickoffUTCMillis(m)); }
function matchDayLabel(m){
  const p = amsterdamDatePartsFromMillis(kickoffUTCMillis(m));
  return p.weekday + ' ' + p.day + ' ' + p.month;
}
function matchTeams(m){
  if(m.home) return [m.home, m.away];
  return (state.koTeams && state.koTeams[m.id]) || String(m.placeholder || '').split(' - ');
}
function predictionLabel(pred){
  return completedPrediction(pred) ? pred[0] + '–' + pred[1] : 'Nog niet ingevuld';
}
function getLiveScore(m){
  return state.liveScores && state.liveScores[m.id] ? state.liveScores[m.id] : null;
}
function getApiStatus(m){
  return state.matchStatuses && state.matchStatuses[m.id] ? state.matchStatuses[m.id] : null;
}
function isLiveStatus(status){
  return ["IN_PLAY", "PAUSED", "LIVE"].includes(status);
}
function matchScheduleStatus(m){
  const status = getApiStatus(m);
  if(getActual(m)) return 'UITSLAG';
  if(status === "FINISHED") return 'AFGELOPEN';
  if(status === "PAUSED") return 'RUST';
  if(isLiveStatus(status) || getLiveScore(m)) return 'LIVE';
  if(status === "SUSPENDED") return 'ONDERBROKEN';
  if(status === "POSTPONED") return 'UITGESTELD';
  if(status === "CANCELLED") return 'AFGELAST';
  return Date.now() >= kickoffUTCMillis(m) ? 'GESLOTEN' : 'OPEN';
}
function matchScheduleStatusClass(m){
  const status = matchScheduleStatus(m);
  if(status === 'UITSLAG' || status === 'AFGELOPEN') return 'played';
  if(status === 'LIVE' || status === 'RUST') return 'live';
  return '';
}
function matchScoreText(m){
  const actual = getActual(m);
  if(actual) return { label: 'Uitslag', score: actual[0] + '–' + actual[1], className: 'final' };
  const live = getLiveScore(m);
  if(live) return { label: 'Live stand', score: live[0] + '–' + live[1], className: 'live' };
  return null;
}

let lastSyncError = null;
let lastSyncedShared = null;

function sharedSnapshot(source=state){
  return JSON.parse(JSON.stringify({
    players: source.players || [],
    predictions: source.predictions || {},
    actuals: source.actuals || {},
    koTeams: source.koTeams || {},
    apiMatchIds: source.apiMatchIds || {},
    matchStatuses: source.matchStatuses || {},
    liveScores: source.liveScores || {},
    syncMeta: source.syncMeta || {}
  }));
}
function updateSyncStatus(mode, text){
  const box = document.getElementById("syncStatus");
  const label = document.getElementById("syncText");
  if(!box || !label) return;
  box.className = "sync-status" + (mode ? " "+mode : "");
  label.textContent = text || (mode==="saving" ? "Opslaan…" : mode==="error" ? "Offline" : "Gesynchroniseerd");
}
function collectChanges(base, local, path=[], out=[]){
  if(JSON.stringify(base)===JSON.stringify(local)) return out;
  const baseObj = base && typeof base==="object";
  const localObj = local && typeof local==="object";
  if(!baseObj || !localObj || Array.isArray(base) || Array.isArray(local)){
    out.push({path, value:local, deleted:local===undefined});
    return out;
  }
  const keys = new Set([...Object.keys(base||{}), ...Object.keys(local||{})]);
  keys.forEach(k=>collectChanges(base?.[k], local?.[k], path.concat(k), out));
  return out;
}
function applyChanges(target, changes){
  changes.forEach(ch=>{
    let obj=target;
    for(let i=0;i<ch.path.length-1;i++){
      const k=ch.path[i];
      if(!obj[k] || typeof obj[k]!=="object") obj[k]={};
      obj=obj[k];
    }
    const key=ch.path[ch.path.length-1];
    if(ch.path.length===0) return;
    if(ch.deleted) delete obj[key];
    else obj[key]=JSON.parse(JSON.stringify(ch.value));
  });
  return target;
}
async function fetchRemoteShared(){
  const r = await fetch(CONFIG.API_URL + (CONFIG.API_URL.includes("?") ? "&" : "?") + "_=" + Date.now(), {cache:"no-store"});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const data = await r.json();
  return sharedSnapshot(data);
}
async function loadState(){
  if(!CONFIG.API_URL || CONFIG.API_URL.indexOf("http")!==0) return;
  try{
    updateSyncStatus("saving","Laden…");
    const remote = await fetchRemoteShared();
    Object.assign(state, remote);
    lastSyncedShared = sharedSnapshot(remote);
    lastSyncError = null;
    updateSyncStatus("","Gesynchroniseerd");
  }catch(err){
    lastSyncError = "Laden mislukt: " + err.message;
    updateSyncStatus("error","Offline");
  }
}
function saveState(){
  saveRequested = true;
  updateSyncStatus("saving","Opslaan…");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 280);
}
async function flushSave(){
  if(saveRunning){ saveRequested = true; return; }
  if(!CONFIG.API_URL || CONFIG.API_URL.indexOf("http")!==0){ showToast(); return; }
  saveRunning = true;
  saveRequested = false;
  try{
    const local = sharedSnapshot();
    const base = lastSyncedShared || sharedSnapshot({});
    const changes = collectChanges(base, local);
    if(!changes.length){ updateSyncStatus("","Gesynchroniseerd"); return; }

    // Stuur alleen de gewijzigde velden. De server verwerkt deze onder LockService,
    // zodat gelijktijdige gebruikers elkaars andere wijzigingen niet overschrijven.
    const r = await fetch(CONFIG.API_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"patch", changes})
    });
    if(!r.ok) throw new Error("HTTP "+r.status);
    const response = await r.json();
    if(!response.ok) throw new Error(response.error || "Server heeft opslag geweigerd");
    const saved = sharedSnapshot(response.data || state);
    Object.assign(state, saved);
    lastSyncedShared = sharedSnapshot(saved);
    lastSyncError = null;
    updateSyncStatus("","Gesynchroniseerd");
    showToast();
  }catch(err){
    lastSyncError = "Opslaan mislukt: " + err.message;
    updateSyncStatus("error","Niet opgeslagen");
    showToast(true);
  }finally{
    saveRunning = false;
    if(saveRequested) flushSave();
  }
}

function getActual(m){
  const override = state.actuals && state.actuals[m.id];
  if(override) return override;
  return m.actual;

// 5 punten: exacte uitslag
// 3 punten: juiste verschil (bv. 2-1 voorspeld, 3-2 werkelijk)
// 1 punt: juiste uitkomst (winst/gelijk/verlies), verschil niet juist
// 0 punten: fout
function calcPoints(pred, actual){
  if(!pred || !actual) return null;
  const [ph,pa] = pred;
  const [ah,aa] = actual;
  if(ph===""||pa===""||ph===null||pa===null) return null;
  const PH=Number(ph), PA=Number(pa), AH=Number(ah), AA=Number(aa);
  if(isNaN(PH)||isNaN(PA)) return null;
  if(PH===AH && PA===AA) return 5;
  const predDiff = PH-PA;
  const actDiff = AH-AA;
  const predOutcome = Math.sign(predDiff);
  const actOutcome = Math.sign(actDiff);
  if(predOutcome!==actOutcome) return 0;
  if(predDiff===actDiff) return 3;
  return 1;
}

function getPred(player, matchId){
  const p = state.predictions[player];
  if(!p) return [null,null];
  return p[matchId] || [null,null];
}

function setPred(player, matchId, idx, val){
  if(!state.predictions[player]) state.predictions[player]={};
  if(!state.predictions[player][matchId]) state.predictions[player][matchId]=[null,null];
  state.predictions[player][matchId][idx] = val;
  saveState();
}

function finalPoints(player, match, raw){ return raw; }
function completedPrediction(pred){ return pred && pred[0]!==null && pred[0]!=='' && pred[1]!==null && pred[1]!==''; }
function otherPredictionsHtml(match){
  if(!isLocked(match)) return '';
  const picks=state.players.map(p=>({p,pred:getPred(p,match.id)})).filter(x=>completedPrediction(x.pred));
  if(!picks.length) return '';
  return `<div class="other-picks">${picks.map(x=>`<span class="pick-chip"><b>${escapeHtml(x.p)}</b> ${x.pred[0]}–${x.pred[1]}</span>`).join('')}</div>`;
}

function renderOverzicht(){
  const main=document.getElementById("main");
  document.getElementById("subhead").textContent=`Welkom ${state.current} · eerstvolgende wedstrijden`;
  const all=MATCHES.concat(KNOCKOUT_MATCHES.filter(m=>state.koTeams&&state.koTeams[m.id]));
  const available=all.filter(m=>!isLocked(m));
  const filled=available.filter(m=>completedPrediction(getPred(state.current,m.id))).length;
  const pct=available.length?Math.round(filled/available.length*100):100;
  const played=all.filter(m=>getActual(m));
  let total=0; played.forEach(m=>{const raw=calcPoints(getPred(state.current,m.id),getActual(m));if(raw!==null)total+=finalPoints(state.current,m,raw);});
  const rows=state.players.map(p=>{let t=0;played.forEach(m=>{const r=calcPoints(getPred(p,m.id),getActual(m));if(r!==null)t+=finalPoints(p,m,r)});return {p,t}}).sort((a,b)=>b.t-a.t);
  const rank=Math.max(1,rows.findIndex(r=>r.p===state.current)+1);

  const sorted=all.slice().sort((a,b)=>kickoffUTCMillis(a)-kickoffUTCMillis(b));
  const todayKey=amsterdamDateKeyFromMillis(Date.now());
  let scheduleKey=null;
  const todayMatches=sorted.filter(m=>matchDateKey(m)===todayKey);
  if(todayMatches.length){
    scheduleKey=todayKey;
  } else {
    const next=sorted.find(m=>!getActual(m) && kickoffUTCMillis(m)>=Date.now());
    scheduleKey=next ? matchDateKey(next) : null;
  }
  const schedule=scheduleKey ? sorted.filter(m=>matchDateKey(m)===scheduleKey && !getActual(m)) : [];
  const scheduleLabel=schedule.length ? matchDayLabel(schedule[0]) : '';

  let html=renderCurrentUserBar();

function renderStand(){
  const main = document.getElementById("main");
  document.getElementById("subhead").textContent = "Tussenstand poule";

  const ALL_MATCHES = MATCHES.concat(KNOCKOUT_MATCHES);
  const playedMatches = ALL_MATCHES.filter(m=>getActual(m));

  let rows = state.players.map(p=>{
    let total=0, exact=0, correctDiff=0, scoringMatches=0, played=0;
    playedMatches.forEach(m=>{
      const pred = getPred(p, m.id);
      const pts = calcPoints(pred, getActual(m));
      if(pts!==null){
        total += pts;
        played++;
        if(pts===5) exact++;
        if(pts===3) correctDiff++;
        if(pts>0) scoringMatches++;
      }
    });
    return {player:p, total, exact, correctDiff, scoringMatches, played};
  });

  rows.sort((a,b)=>
    b.total-a.total ||
    b.exact-a.exact ||
    b.correctDiff-a.correctDiff ||
    b.scoringMatches-a.scoringMatches
  );

  rows.forEach((row,i)=>{
    if(i===0){
      row.rank = 1;
      return;
    }
    const prev = rows[i-1];
    const tied = row.total===prev.total &&
      row.exact===prev.exact &&
      row.correctDiff===prev.correctDiff &&
      row.scoringMatches===prev.scoringMatches;
    row.rank = tied ? prev.rank : i+1;
  });

  const PRIZES = ["🥇 Gratis diner (de rest trakteert)","🥈 Gratis drinken bij het eten","🥉 Mag de eetplek uitkiezen"];

  let html = `<div class="rules-box">
    <b>${playedMatches.length}</b> van de 104 wedstrijden (groepsfase + knock-out) zijn al gespeeld of hebben een ingevulde uitslag. Punten worden automatisch berekend op basis van de uitslagen en de voorspellingen die zijn ingevuld.
  </div>`;

  if(playedMatches.length===0){
    html += `<div class="empty">Nog geen wedstrijden gespeeld of voorspellingen ingevuld.</div>`;
  } else {
    html += `<table class="lb-table">
      <thead><tr><th>#</th><th>Speler</th><th>Wedstrijden</th><th>5/5</th><th>Punten</th></tr></thead>
      <tbody>`;
    rows.forEach(r=>{
      const prize = r.rank<=3 ? `<div style="font-size:0.7rem;color:var(--accent);font-weight:700;margin-top:2px;">${PRIZES[r.rank-1]}</div>` : "";
      const tieInfo = `<div style="font-size:0.66rem;color:var(--muted);margin-top:3px;line-height:1.35;">${r.exact} exact · ${r.correctDiff} juist saldo · ${r.scoringMatches} raak</div>`;
      html += `<tr class="${r.player===state.current?'you':''}">
        <td class="rank">${r.rank}</td>
        <td>${escapeHtml(r.player)}${prize}${tieInfo}</td>
        <td>${r.played}/${playedMatches.length}</td>
        <td>${r.exact}</td>
        <td class="points">${r.total}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  main.innerHTML = html;
}

  main.querySelectorAll('input[data-match]').forEach(inp=>{
    inp.addEventListener("change", ()=>{
      const val = inp.value === "" ? null : inp.value;
      setPred(state.current, inp.dataset.match, Number(inp.dataset.idx), val);
      render();
    });
  });

  main.querySelectorAll('[data-editteams]').forEach(el=>{
    el.onclick = ()=>{
      state.editingTeams = (state.editingTeams===el.dataset.editteams) ? null : el.dataset.editteams;
      render();
    };
  });

  main.querySelectorAll('[data-saveteams]').forEach(btn=>{
    btn.onclick = ()=>{
      const mid = btn.dataset.saveteams;
      const inputs = main.querySelectorAll(`input[data-teamname="${mid}"]`);
      const t1 = inputs[0].value.trim(), t2 = inputs[1].value.trim();
      if(!t1 || !t2) return;
      if(!state.koTeams) state.koTeams = {};
      state.koTeams[mid] = [t1, t2];
      state.editingTeams = null;
      saveState();
      render();
    };
  });

  main.querySelectorAll('[data-saveactual]').forEach(btn=>{
    btn.onclick = ()=>{
      const mid = btn.dataset.saveactual;
      const inputs = main.querySelectorAll(`input[data-actual="${mid}"]`);
      const h = inputs[0].value, a = inputs[1].value;
      if(h==="" || a===""){ return; }
      if(!state.actuals) state.actuals = {};
      state.actuals[mid] = [Number(h), Number(a)];
      state.editingActual = null;
      saveState();
      render();
    };
  });

  main.querySelectorAll('[data-editactual]').forEach(el=>{
    el.onclick = ()=>{
      state.editingActual = (state.editingActual===el.dataset.editactual) ? null : el.dataset.editactual;
      render();
    };
  });
}

function renderSpelers(){
  const main = document.getElementById("main");
  document.getElementById("subhead").textContent = "Spelers beheren";

  let html = `<div class="manage-row">
    <input type="text" id="newPlayerName" placeholder="Naam van vriend(in)">
    <button id="addPlayerBtn">Toevoegen</button>
  </div>`;

  state.players.forEach(p=>{
    html += `<div class="player-row">
      <input type="text" class="rename-input" data-rename="${escapeAttr(p)}" value="${escapeAttr(p)}" style="flex:1;margin-right:8px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:0.9rem;">
      ${state.players.length>1?`<span class="remove" data-remove="${escapeAttr(p)}">Verwijderen</span>`:''}
    </div>`;
  });

  html += `<div class="rules-box" style="margin-top:14px;">
    Voeg hier al je vrienden toe. Iedereen vult zijn eigen voorspellingen in via het tabblad "Voorspellen" – kies eerst de naam boven in de lijst.
  </div>`;

  main.innerHTML = html;

  document.getElementById("addPlayerBtn").onclick = ()=>{
    const input = document.getElementById("newPlayerName");
    const name = input.value.trim();
    if(name && !state.players.includes(name)){
      state.players.push(name);
      saveState();
      render();
    }
  };

  main.querySelectorAll('.rename-input').forEach(inp=>{
    inp.addEventListener("change", ()=>{
      const oldName = inp.dataset.rename;
      const newName = inp.value.trim();
      if(!newName || newName===oldName) { inp.value = oldName; return; }
      if(state.players.includes(newName)){ inp.value = oldName; return; }
      // rename in players list
      state.players = state.players.map(p=>p===oldName?newName:p);
      // move predictions
      if(state.predictions[oldName]){
        state.predictions[newName] = state.predictions[oldName];
        delete state.predictions[oldName];
      }
      if(state.current===oldName) state.current = newName;
      if(state.localName===oldName) state.localName = newName;
      saveLocalName(newName);
      saveState();
      render();
    });
  });

  main.querySelectorAll('[data-remove]').forEach(el=>{
    el.onclick = ()=>{
      const name = el.dataset.remove;
      state.players = state.players.filter(p=>p!==name);
      delete state.predictions[name];
      if(state.current===name) state.current = state.players[0];
      saveState();
      render();
    };
  });
}

  let configWarning = "";
  if(!CONFIG.API_URL || CONFIG.API_URL.indexOf("http")!==0){
    configWarning = `<div class="rules-box" style="border-color:var(--red);">
      <b style="color:var(--red);">⚠️ Niet verbonden met gedeelde opslag</b><br>
      Vul in de HTML-code bij <code>CONFIG.API_URL</code> de Apps Script Web App URL in, zodat alle spelers dezelfde stand zien.
    </div>`;
  } else if(lastSyncError){
    configWarning = `<div class="rules-box" style="border-color:var(--red);">
      <b style="color:var(--red);">⚠️ Verbindingsprobleem met Google Sheet</b><br>
      ${escapeHtml(lastSyncError)}<br><br>
      Check of de Apps Script Web App URL klopt en of de deployment "Toegang: Iedereen" heeft.
    </div>`;
  } else {
    configWarning = `<div class="rules-box" style="border-color:var(--accent2);">
      <b style="color:var(--accent2);">✓ Verbonden met gedeelde opslag</b>
    </div>`;
  }

  main.innerHTML = configWarning + `
  <div class="rules-box">
    <b>⚡ Automatische uitslagen</b><br>De officiële uitslagen worden centraal opgehaald en automatisch verwerkt. Alleen wedstrijden die door de databron als <b>afgelopen</b> zijn gemarkeerd, tellen definitief mee. Als de verbinding tijdelijk uitvalt, blijft de laatst bekende stand bewaard en probeert het systeem het later opnieuw. Een handmatige correctie blijft mogelijk als vangnet.
  </div>
  <div class="rules-box">
    <b>Puntensysteem per wedstrijd</b>
    <ul>
      <li><b>5 punten</b> – exacte uitslag goed (bv. 2-1 voorspeld, 2-1 geworden)</li>
      <li><b>3 punten</b> – juiste uitkomst én juist doelsaldo, maar niet de exacte stand (bv. 2-1 voorspeld, 3-2 geworden)</li>
      <li><b>1 punt</b> – juiste uitkomst (winst/gelijk/verlies), maar verkeerd saldo (bv. 2-0 voorspeld, 1-0 geworden)</li>
      <li><b>0 punten</b> – verkeerde uitkomst</li>
    </ul>
  </div>
  <div class="rules-box">
    <b>🏆 Gelijke stand</b><br>
    Eindigen twee of meer spelers met evenveel punten, dan wordt de volgorde bepaald aan de hand van:
    <ol style="margin:8px 0 0;padding-left:20px;">
      <li>het meeste aantal exacte uitslagen van 5 punten;</li>
      <li>daarna het meeste aantal voorspellingen met de juiste uitkomst én het juiste doelsaldo van 3 punten;</li>
      <li>daarna het meeste aantal wedstrijden waarop minimaal 1 punt is behaald;</li>
    </ol>
    <div style="margin-top:8px;">Zijn ook al deze aantallen gelijk, dan delen de spelers dezelfde positie. De volgende positie wordt dan overgeslagen, bijvoorbeeld: 1, 2, 2, 4. Spelers op een gedeelde prijspositie delen de bijbehorende plaats en prijs.</div>
  </div>
  <div class="rules-box">
    <b>Al gespeelde wedstrijden</b><br>
    Wedstrijden die al gespeeld zijn (groen gemarkeerd) hebben een vaste uitslag in het schema. Iedereen die op tijd een voorspelling had ingevuld krijgt daarvoor automatisch punten op de tussenstand. Vul je een voorspelling later nog in voor een gespeelde wedstrijd, dan telt die ook gewoon mee voor jouw punten.
  </div>
  <div class="rules-box">
    <b>Hoe werkt het?</b><br>
    1. Ga naar "Spelers" en voeg iedereen toe.<br>
    2. Kies bovenin "Voorspellen" je eigen naam.<br>
    3. Vul per groep de uitslagen in die jij verwacht.<br>
    4. Check "Stand" voor de actuele ranglijst zodra wedstrijden gespeeld zijn.<br><br>
    Alleen de groepsfase (72 wedstrijden) staat in deze poule. Tip: voeg na de groepsfase de knock-outwedstrijden toe als die bekend zijn.
  </div>`;
}

function bindCommonHandlers(){
  const sw = document.getElementById("switchUserBtn");
  if(sw) sw.onclick = ()=>{ renderLogin(); };
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s){ return escapeHtml(s); }

/* ---------- LOGIN ---------- */
function renderLogin(){
  const main = document.getElementById("main");
  document.getElementById("tabs").style.display = "none";
  document.getElementById("subhead").textContent = "Wie ben jij?";

  let html = `<div class="rules-box">Kies je naam. Dit onthouden we op dit toestel.</div>`;
  html += `<div class="player-select">${state.players.map(p=>
    `<button class="player-chip" data-login="${escapeAttr(p)}">${escapeHtml(p)}</button>`
  ).join("")}</div>`;

  main.innerHTML = html;

  main.querySelectorAll('[data-login]').forEach(btn=>{
    btn.onclick = ()=>{
      const name = btn.dataset.login;
      const adminSession = isAdmin();
      state.current = name;
      if(!adminSession) saveLocalName(name);
      document.getElementById("tabs").style.display = "";
      render();
    };
  });
}

window.addEventListener("online", ()=>{ updateSyncStatus("","Online"); if(saveRequested) flushSave(); });
window.addEventListener("offline", ()=>updateSyncStatus("error","Offline"));

/* ---------- INIT ---------- */
(async function(){
  await loadState();
  const localName = await loadLocalName();
  if(localName && state.players.includes(localName)){
    state.localName = localName;
    state.current = localName;
    render();
  } else {
    renderLogin();
  }

  // Haal wijzigingen van andere spelers regelmatig op, maar nooit tijdens een lokale opslagactie.
  if(CONFIG.API_URL && CONFIG.API_URL.indexOf("http")===0){
    setInterval(async ()=>{
      if(saveRunning || saveRequested) return;
      const before = JSON.stringify(sharedSnapshot());
      await loadState();
      const after = JSON.stringify(sharedSnapshot());
      if(before!==after) render();
    }, 12000);
    window.addEventListener("focus", async ()=>{
      if(saveRunning || saveRequested) return;
      const before = JSON.stringify(sharedSnapshot());
      await loadState();
      if(before!==JSON.stringify(sharedSnapshot())) render();
    });
  }
})();
</script>

</html>
